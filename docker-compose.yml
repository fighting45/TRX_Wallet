version: '3.8'

services:
  trx-wallet:
    build: .
    container_name: trx-wallet-service
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
      - LARAVEL_URL=${LARAVEL_URL}
      - LARAVEL_API_SECRET=${LARAVEL_API_SECRET}
      - AUTO_START_LISTENERS=true
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=tron_wallet
      - DB_SYNCHRONIZE=false
      - MASTER_PASSWORD=${MASTER_PASSWORD}
      - TRON_RPC_URL=https://api.trongrid.io
      - TRON_API_TYPE=rest
      - TRON_API_KEY=${TRON_API_KEY}
      - TRON_API_KEY_2=${TRON_API_KEY_2}
      - TRON_API_KEY_3=${TRON_API_KEY_3}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/api/wallet/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - trx-wallet-network

  postgres:
    image: postgres:14-alpine
    container_name: trx-wallet-db
    environment:
      - POSTGRES_DB=tron_wallet
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/modules/listeners/database-setup.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d tron_wallet"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trx-wallet-network

volumes:
  postgres_data:
    driver: local

networks:
  trx-wallet-network:
    driver: bridge
